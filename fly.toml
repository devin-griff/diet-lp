# Fly.io config for the Diet Streamlit app.
# Public URL after deploy: https://griffith-pse-diet.fly.dev
# Custom domain (set up later): https://diet.griffith-pse.com

app = "griffith-pse-diet"
primary_region = "ord"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
